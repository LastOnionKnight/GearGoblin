name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Locate plugin zip
        id: locate
        shell: pwsh
        run: |
          # DalamudPackager (bundled with Dalamud.NET.Sdk) emits a ready-to-ship
          # zip under bin/Release/<InternalName>/latest.zip. Find it and surface
          # the path so the release step can attach it.
          $zip = Get-ChildItem -Path "bin\Release" -Filter "latest.zip" -Recurse | Select-Object -First 1
          if (-not $zip) {
            Write-Error "latest.zip not found under bin\Release. DalamudPackager may have failed or output to an unexpected path."
            exit 1
          }
          Write-Host "Found plugin zip at: $($zip.FullName)"
          "zip=$($zip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate.outputs.zip }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
