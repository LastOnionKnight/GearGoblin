name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          ref: main

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud reference assemblies
        shell: pwsh
        run: |
          $dalamudPath = "$env:APPDATA\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Path $dalamudPath -Force | Out-Null
          Invoke-WebRequest `
            -Uri "https://goatcorp.github.io/dalamud-distrib/stg/latest.zip" `
            -OutFile "$env:TEMP\dalamud-latest.zip"
          Expand-Archive -Path "$env:TEMP\dalamud-latest.zip" -DestinationPath $dalamudPath -Force

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          IFS=. read -r a b c d <<< "$VER"
          [ -z "$d" ] && d=0
          ASMVER="${a}.${b}.${c}.${d}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "ver=$VER"       >> "$GITHUB_OUTPUT"
          echo "asmver=$ASMVER" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: >
          dotnet build -c Release --no-restore
          -p:Version=${{ steps.ver.outputs.ver }}
          -p:AssemblyVersion=${{ steps.ver.outputs.asmver }}
          -p:FileVersion=${{ steps.ver.outputs.asmver }}

      - name: Locate plugin zip
        id: locate
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path "bin\Release" -Filter "latest.zip" -Recurse | Select-Object -First 1
          if (-not $zip) {
            Write-Error "latest.zip not found under bin\Release. DalamudPackager may have failed."
            exit 1
          }
          Write-Host "Found plugin zip at: $($zip.FullName)"
          "zip=$($zip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate.outputs.zip }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update repo.json
        shell: bash
        run: |
          set -euo pipefail
          ASMVER="${{ steps.ver.outputs.asmver }}"
          TAG="${{ steps.ver.outputs.tag }}"
          NOW=$(date -u +%s)
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/latest.zip"
          jq --arg v   "$ASMVER" \
             --arg url "$URL" \
             --argjson ts "$NOW" '
             map(
               if .InternalName == "GearGoblin" then
                 .AssemblyVersion       = $v
                 | .DownloadLinkInstall = $url
                 | .DownloadLinkUpdate  = $url
                 | .DownloadLinkTesting = $url
                 | .LastUpdate          = $ts
               else . end
             )' repo.json > repo.json.new
          mv repo.json.new repo.json

      - name: Commit and push repo.json
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repo.json
          if git diff --cached --quiet; then
            echo "repo.json unchanged"; exit 0
          fi
          git commit -m "chore(repo): bump GearGoblin to ${{ steps.ver.outputs.ver }} [skip ci]"
          git push origin HEAD:main
